<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Donate Blood</title>
        <link rel="stylesheet" href="../CSS/donate.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="../CSS/nav.css">
</head>

<body>

        <!-- Nav -->
         <div id="header"></div>
        

        <!-- Form -->
        <div class="container mt-5 pt-5">
                <div class="row justify-content-center g-3">
                        <div class="col-12 col-md-6 login-box mb-5">
                                <h3 class="text-center mb-4">Donate Blood</h3>
                                <div id="error-message" class="text-danger mb-3" role="alert" aria-live="polite"></div>
                                <form id="donorForm" novalidate>
                                        <div class="form-floating mb-3 position-relative">
                                                <input type="text" class="form-control" id="donorName"
                                                        placeholder="Donor Name" required>
                                                <label for="donorName">Donor Name</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <input type="text" class="form-control" id="mobileNumber"
                                                        placeholder="Mobile Number" required>
                                                <label for="mobileNumber">Mobile Number</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <input type="number" class="form-control" id="age"
                                                        placeholder="Donor Age" min="0" required>
                                                <label for="donorAge">Donor Age</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <input type="text" class="form-control" id="city"
                                                        placeholder="Enter City" required>
                                                <label for="city">City</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <select class="form-control" id="bloodGroup" required>
                                                        <option value="" disabled selected>Select</option>
                                                        <option value="A+">A+</option>
                                                        <option value="A-">A-</option>
                                                        <option value="B+">B+</option>
                                                        <option value="B-">B-</option>
                                                        <option value="AB+">AB+</option>
                                                        <option value="AB-">AB-</option>
                                                        <option value="O+">O+</option>
                                                        <option value="O-">O-</option>
                                                </select>
                                                <label for="bloodGroup">Blood Group</label>
                                        </div>
                                        <table style="margin: 10px 40px;">
                                                <tr style="border-bottom: 1px solid black;" class="tr-y">
                                                        <th id="out"><label for="q4_yes" class="mb-3">Have you ever
                                                                        Donated Blood?:</label></th>
                                                        <td>
                                                                <input type="radio" name="medications" id="q4_yes"
                                                                        value="yes" class="mb-3"
                                                                        style="margin-left: 3vh;">
                                                                <label for="q4_yes"
                                                                        style="font-weight: bold;">Yes</label>
                                                                <input type="radio" name="medications" id="q4_no"
                                                                        value="no" class="mb-3"
                                                                        style="margin-left: 5vh;">
                                                                <label for="q4_no" style="font-weight: bold;">No</label>
                                                        </td>
                                                </tr>

                                                <tr class="p-2 d-none">
                                                        <th id="out"><label for="last_donation" class="mt-3">Date of
                                                                        your last blood donation:</label></th>
                                                        <td>
                                                                <input type="date" name="last_donation"
                                                                        id="lastDonation" class="mt-3 mb-1"
                                                                        style="margin-left: 5vh;">
                                                        </td>
                                                </tr>
                                        </table>

                                        <button type="submit" class="btn btn-primary w-100">Donor Register</button>

                                        <div class="footer-text mt-3">Need to registration ? <a
                                                        href="register.html">Register</a>
                                        </div>
                                </form>
                        </div>
                </div>
        </div>

        <!-- Footer -->
        <div id="footer"></div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../JS/donor.js"></script>
<script src="../JS/nav.js"></script>

</html>
