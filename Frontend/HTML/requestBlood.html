<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Donate Blood</title>
        <link rel="stylesheet" href="../CSS/request-blood.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="../CSS/nav.css">
</head>

<body>

        <!-- Nav -->
        <div id="header"></div>
        <!-- Form -->
        <div class="container mt-5 pt-5">
                <div class="row justify-content-center g-3">
                        <div class="col-12 col-md-6 login-box">
                                <h3 class="text-center mb-4">Request Blood</h3>
                                <div id="error-message" class="text-danger mb-3" role="alert" aria-live="polite"></div>
                                <form id="requestBloodForm" novalidate>
                                        <div class="form-floating mb-3 position-relative">
                                                <input type="text" class="form-control" id="patientName"
                                                        placeholder="Patient Name" required>
                                                <label for="patientName">Patient Name</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <input type="number" class="form-control" id="patientAge"
                                                        placeholder="Patient Age" min="0" required>
                                                <label for="patientAge">Patient Age</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <input type="text" class="form-control" id="aadharNumber"
                                                        placeholder="Aadhar Number" maxlength="12" required>
                                                <label for="aadharNumber">Aadhar Number</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <select class="form-control" id="bloodGroup" required>
                                                        <option value="" disabled selected>Select</option>
                                                        <option value="A+">A+</option>
                                                        <option value="A-">A-</option>
                                                        <option value="B+">B+</option>
                                                        <option value="B-">B-</option>
                                                        <option value="AB+">AB+</option>
                                                        <option value="AB-">AB-</option>
                                                        <option value="O+">O+</option>
                                                        <option value="O-">O-</option>
                                                </select>
                                                <label for="bloodGroup">Blood Group</label>
                                        </div>
                                        <div class="form-floating mb-3 position-relative">
                                                <input list="districtsList" id="districtInput" class="form-control"
                                                        placeholder="Enter district" onkeyup="filterDistrict()"
                                                         required>

                                                <ul id="districtList"></ul>
                                                <label for="district">District</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative" id="hospitalList">

                                                <!-- Hospital Dropdown -->
                                                <select id="hospitalDropdown" class="form-control" onchange="addHospital()" required>
                                                        <option>Select Hospital</option>
                                                </select>
                                                <label for="hospitalOption">Choose 5 Hospital</label>

                                                <ul id="selectedHospitals"></ul>
                                        </div>
                                        <div class="form-floating mb-3 position-relative">
                                                <select class="form-control" id="timePeriod" required>
                                                        <option value="" disabled selected>Select</option>
                                                        <option value="A+">Normal</option>
                                                        <option value="A-">Urgent</option>
                                                </select>
                                                <label for="timePeriod">Time Period</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <input type="number" class="form-control" id="unitNeeded"
                                                        placeholder="Unit Needed" min="1" required>
                                                <label for="unitNeeded">Unit Needed</label>
                                        </div>

                                        <button type="submit" class="btn btn-primary w-100"
                                                onclick="validateDistrict()">Request Send</button>

                                        <div class="footer-text mt-3">Want to Donate? <a href="eligible.html">Donate
                                                        Blood</a></div>
                                </form>
                        </div>
                </div>
        </div>

        <!-- Footer -->
        <div id="footer"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../JS/requestBlood.js"></script>
<script src="../JS/nav.js"></script>
</html>
