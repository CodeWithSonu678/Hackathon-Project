<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register Page</title>


        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

        <link rel="stylesheet" href="../CSS/register.css">
</head>

<body>

        <div class="container">
                <div class="row justify-content-center">
                        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                                <div class="login-box">
                                        <h3 class="text-center mb-4">Register</h3>
                                        <form id="registerForm" novalidate>
                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="text" class="form-control" id="name"
                                                                placeholder="Full Name" required>
                                                        <label for="username">Full Name</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="date" class="form-control" id="dob"
                                                                placeholder="Date of birth" required>
                                                        <label for="username">Date of birth</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="tel" class="form-control" id="mobileNumber"
                                                                placeholder="Mobile Number" required>
                                                        <label for="username">Mobile Number</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="email" class="form-control" id="email"
                                                                placeholder="Email" required>
                                                        <label for="username">Email</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="tel" class="form-control" id="aadharNumber"
                                                                placeholder="Aadhar Number" required>
                                                        <label for="username">Aadhar Number</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <select name="" id="gender" class="form-control">
                                                                <option value="Select">Select</option>
                                                                <option value="Male">Male</option>
                                                                <option value="Female">Female</option>
                                                                <option value="Other">Other</option>
                                                        </select>
                                                        <label for="username">Gender</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <select name="" id="bloodGroup" class="form-control">
                                                                <option value="Select">Select</option>
                                                                <option value="A+">A+</option>
                                                                <option value="A+">A-</option>
                                                                <option value="A+">B+</option>
                                                                <option value="A+">B-</option>
                                                                <option value="A+">AB+</option>
                                                                <option value="A+">AB-</option>
                                                                <option value="A+">O+</option>
                                                                <option value="A+">O-</option>
                                                        </select>
                                                        <label for="username">Blood Group</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="text" class="form-control" id="address"
                                                                placeholder="Address" required>
                                                        <label for="username">Address</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="tel" class="form-control" id="pinCode"
                                                                placeholder="PIN code" required>
                                                        <label for="username">PIN code</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="password" class="form-control" id="password"
                                                                placeholder="Password" required>
                                                        <label for="password">Password</label>
                                                        <button class="toggle-password"
                                                                onclick="togglePassword()">Show</button>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="password" class="form-control" id="confirmPassword"
                                                                placeholder="Confirm Password" required>
                                                        <label for="confirmPassword">Confirm Password</label>
                                                        <button class="toggle-password"
                                                                onclick="ctogglePassword()">Show</button>
                                                </div>

                                                <div class="form-floating mb-2 position-relative check-box">

                                                        <input type="checkbox" id="checkBox">
                                                        <p class="m-3">I accept terms & conditions <a href="#">
                                                                        View terms
                                                                </a></p>
                                                </div>

                                                <button type="submit" class="btn btn-primary w-100">Register</button>

                                                <div class="footer-text">Have an account?<a href="loogin.html">Login</a>
                                                </div>
                                        </form>
                                </div>
                        </div>
                </div>
        </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <script src="../JS/register.js"></script>

</body>

</html>


</html>
