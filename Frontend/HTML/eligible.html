<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="../CSS/eligible.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

        <!-- Nav -->
        <div class="outer-navbody">
                <div class="nav-logo-img">
                        <img src=".../5CSS/img/new-logo.jpeg" alt="">
                </div>
                <div class="nav-links-url">
                        <ul class="link-li">
                                <li><a href="index.html">Home</a></li>
                                <li><a href="#about-us">About</a></li>
                                <li><a href="">Contact</a></li>
                                <li><a href="HTML/loogin.html"><button class="bl-btn">Login</button></a></li>

                        </ul>
                </div>
                <div class="nav-link-toggle">
                        <button id="navToggleBtn" aria-label="Toggle navigation" aria-controls="navToggleLinks" aria-expanded="false" style="margin-right: 10px;">☰</button>

                </div>


        </div>
        <div class="nav-toggle-links" id="navToggleLinks" aria-hidden="true">
                <ul class="toggle-li">
                        <li><a href="">Home</a></li>
                        <li><a href="#about-us">About</a></li>
                        <li><a href="">Contact</a></li>
                        <li><a href="HTML/loogin.html"><button class="bl-btn">Login</button></a></li>
                        <li><a href="HTML/register.html"><button class="bl-btn">Register</button></a></li>
                </ul>
        </div>

        <!-- Form -->
        <div class="form-body">
                <div class="inner-img">
                        <img src="../CSS/img/reg-img.png" alt="" style="height: 550px;">
                </div>
                <div class="login-box">
                        <div class="h-txt">
                        <p >Check Your Blood Donation Eligibility </p>
                        </div>
                                <form action="#" method="post">
                                <table style="margin: 15px 50px;">
                                        <tr style="border-bottom: 1px solid black;">
                                                <th id="out"><label for="q1_yes" class="mt-3 mb-1">Are you between 18 and 65 years old:</label></th>
                                                <td>
                                                        <input type="radio" name="age_range" id="q1_yes" value="yes" class="mt-3 mb-1">
                                                        <label for="q1_yes" style="font-weight: bold;" >Yes</label>
                                                        <input type="radio" name="age_range" id="q1_no" value="no" class="mt-3 mb-1">
                                                        <label for="q1_no" style="font-weight: bold;">No</label>
                                                </td>
                                        </tr>
                                        <tr style="border-bottom: 1px solid black;">
                                                <th id="out"><label for="q2_yes" class="mt-3 mb-1">Do you weigh over 50 kg?:</label></th>
                                                <td>
                                                        <input type="radio" name="weight" id="q2_yes" value="yes" class="mt-3 mb-1">
                                                        <label for="q2_yes" style="font-weight: bold;">Yes</label>
                                                        <input type="radio" name="weight" id="q2_no" value="no" class="mt-3 mb-1">
                                                        <label for="q2_no" style="font-weight: bold;">No</label>
                                                </td>
                                        </tr>
                                        <tr style="border-bottom: 1px solid black;">
                                                <th id="out"><label for="q3_yes" class="mt-3 mb-1">Have you been ill in last two weeks?:</label></th>
                                                <td>
                                                        <input type="radio" name="recent_illness" id="q3_yes" value="yes" class="mt-3 mb-1">
                                                        <label for="q3_yes" style="font-weight: bold;">Yes</label>
                                                        <input type="radio" name="recent_illness" id="q3_no" value="no" class="mt-3 mb-1">
                                                        <label for="q3_no" style="font-weight: bold;">No</label>
                                                </td>
                                        </tr>
                                        <tr style="border-bottom: 1px solid black;" >
                                                <th id="out"><label for="q4_yes" class="mt-3 mb-1">Are you currently taking any medicine?:</label></th>
                                                <td>
                                                        <input type="radio" name="medications" id="q4_yes" value="yes" class="mt-3 mb-1">
                                                        <label for="q4_yes" style="font-weight: bold;">Yes</label>
                                                        <input type="radio" name="medications" id="q4_no" value="no" class="mt-3 mb-1">
                                                        <label for="q4_no" style="font-weight: bold;">No</label>
                                                </td>
                                        </tr>
                                        <tr style="border-bottom: 1px solid black;" class="p-2">
                                                <th id="out"><label for="last_donation" class="mt-3">Date of your last blood donation:</label></th>
                                                <td >
                                                        <input type="date" name="last_donation" id="last_donation" class="mt-3 mb-1">
                                                </td>
                                        </tr>
                                </table>
                                
                        </form>
                                <button type="submit" class="btn btn-primary mt-2 mb-4">Submit</button>
                </div>

        </div>


</body>

</html>
