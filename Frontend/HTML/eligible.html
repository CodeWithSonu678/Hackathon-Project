<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Donate Blood</title>
        <link rel="stylesheet" href="../CSS/eligible.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="../CSS/nav.css">
</head>

<body>

        <!-- Nav -->
        <div id="header"></div>


        </div>

        <!-- Form -->
        <div class="form-body">
                <div class="login-box">
                        <div class="h-txt">
                                <p>Check Your Blood Donation Eligibility </p>
                        </div>
                        <div id="error-message" class="text-danger mb-3 MT-4" role="alert" aria-live="polite"></div>
                        <form id="eligibleForm" method="post" class="e-form">
                                <table style="margin: 15px 50px;">
                                        <tr style="border-bottom: 1px solid black;">
                                                <th id="out"><label for="q1_yes" class="mt-3 mb-1">Are you between 18
                                                                and 65 years old:</label></th>
                                                <td>
                                                        <input type="radio" name="age" id="q1_yes" value="true" class="mt-3 mb-1">
                                                        <label for="q1_yes" style="font-weight: bold;" >Yes</label>
                                                        <input type="radio" name="age" id="q1_no" value="false" class="mt-3 mb-1">
                                                        <label for="q1_no" style="font-weight: bold;">No</label>
                                                </td>
                                        </tr>
                                        <tr style="border-bottom: 1px solid black;">
                                                <th id="out"><label for="q2_yes" class="mt-3 mb-1">Do you weigh over 50
                                                                kg?:</label></th>
                                                <td>
                                                        <input type="radio" name="weight" id="q2_yes" value="true" class="mt-3 mb-1">
                                                        <label for="q2_yes" style="font-weight: bold;">Yes</label>
                                                        <input type="radio" name="weight" id="q2_no" value="false" class="mt-3 mb-1">
                                                        <label for="q2_no" style="font-weight: bold;">No</label>
                                                </td>
                                        </tr>
                                        <tr style="border-bottom: 1px solid black;">
                                                <th id="out"><label for="q3_yes" class="mt-3 mb-1">Have you been ill in
                                                                last two weeks?:</label></th>
                                                <td>
                                                        <input type="radio" name="healthCondition" id="q3_yes" value="true" class="mt-3 mb-1">
                                                        <label for="q3_yes" style="font-weight: bold;">Yes</label>
                                                        <input type="radio" name="healthCondition" id="q3_no" value="false" class="mt-3 mb-1">
                                                        <label for="q3_no" style="font-weight: bold;">No</label>
                                                </td>
                                        </tr>
                                        <tr style="border-bottom: 1px solid black;">
                                                <th id="out"><label for="q4_yes" class="mt-3 mb-1">Are you currently
                                                                taking any medicine?:</label></th>
                                                <td>
                                                        <input type="radio" name="takeMedicine" id="q4_yes" value="true" class="mt-3 px-4 mb-1">
                                                        <label for="q4_yes" style="font-weight: bold;">Yes</label>
                                                        <input type="radio" name="takeMedicine" id="q4_no" value="false" class="mt-3 mb-1">
                                                        <label for="q4_no" style="font-weight: bold;">No</label>
                                                </td>
                                        </tr>
                                        <tr style="border-bottom: 1px solid black;">
                                                <th id="out"><label for="q5_yes" class="mt-3 mb-1">Have you donated
                                                                blood before?:</label></th>
                                                <td>
                                                        <input type="radio" name="haveDonated" id="q5_yes" value="true" class="mt-3 px-4 mb-1">
                                                        <label for="q5_yes" style="font-weight: bold;">Yes</label>
                                                        <input type="radio" name="haveDonated" id="q5_no" value="false" class="mt-3 mb-1">
                                                        <label for="q5_no" style="font-weight: bold;">No</label>
                                                </td>
                                        </tr>
                                        <tr style="border-bottom: 1px solid black;" class="p-2" id="donate-date">
                                                <th id="out"><label for="last_donation" class="mt-3">Date of your last
                                                                blood donation:</label></th>
                                                <td>
                                                        <input type="date" name="lastDonation" id="last_donation"
                                                                class="mt-3 mb-1">
                                                </td>
                                        </tr>
                                </table>

                                <button type="submit" class="btn btn-primary mt-2 mb-4">Submit</button>
                        </form>
                </div>

        </div>
        <!-- Footer -->
        <div id="footer"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../JS/eligible.js"></script>
<script src="../JS/nav.js"></script>
</html>
