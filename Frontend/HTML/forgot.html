<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
    <link rel="stylesheet" href="../CSS/forgot.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="containers">

        <!-- Steps -->
        <div class="steps">
            <div class="step active">
                <div class="circle">1</div>
                <p>Email Verification</p>
            </div>

            <div class="step">
                <div class="circle">2</div>
                <p>OTP Verification</p>
            </div>

            <div class="step">
                <div class="circle">3</div>
                <p>Reset Password</p>
            </div>
        </div>
    </div>

    <!-- Email -->


    <!-- Card -->
    <div class="containers mail" id="mail">
        <div class="card">
            <div class="input-box">
                <span class="icon"><i class="bi bi-envelope"></i></span>
                <input type="email" placeholder="Enter your email">
            </div>

            <button class="btn-1">Continue</button>
        </div>

        <!-- Footer -->
        <div class="footer">
            Remember your password? <span>Sign in</span>
        </div>

    </div>


    <!-- OTP -->
    <div class="containers otp-verify" id="otp">

        <!-- Card -->
        <div class="card">
            <p class="title">Enter OTP</p>

            <div class="otp-box">
                <input type="tel" maxlength="1">
                <input type="tel" maxlength="1">
                <input type="tel" maxlength="1">
                <input type="tel" maxlength="1">
                <input type="tel" maxlength="1">
                <input type="tel" maxlength="1">
            </div>

            <button class="btn-1">Verify</button>
        </div>

        <!-- Footer -->
        <div class="footer">
            Didn’t receive code? <span>Resend</span>
        </div>
    </div>


    <!-- Password -->

    <div class="containers pass" id="pass">

        <!-- Card -->
        <div class="card">
            <p class="title">Create New Password</p>

            <!-- New Password -->
            <div class="input-box">
                <span><i class="bi bi-lock"></i></span>
                <input type="password" placeholder="New Password">
            </div>

            <!-- Confirm Password -->
            <div class="input-box">
                <span><i class="bi bi-lock"></i></span>
                <input type="password" placeholder="Confirm Password">
            </div>

            <button class="btn-1">Password</button>
        </div>



    </div>
</body>

</html>
