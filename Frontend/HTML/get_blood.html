<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Donate Blood</title>
        <link rel="stylesheet" href="../CSS/get_blood.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

         <!-- Nav -->
        <div class="outer-navbody">
                <div class="nav-logo-img">
                        <img src="../CSS/img/new-logo.jpeg" alt="">
                </div>
                <div class="nav-links-url">
                        <ul class="link-li">
                                <li><a href="index.html">Home</a></li>
                                <li><a href="#about-us">About</a></li>
                                <li><a href="">Contact</a></li>
                                <li><a href="HTML/loogin.html"><button class="bl-btn">Login</button></a></li>
                                <li><a href="HTML/register.html"><button class="bl-btn">Register</button></a></li>
                        </ul>
                </div>
                <div class="nav-link-toggle">
                        <button id="navToggleBtn" aria-label="Toggle navigation" aria-controls="navToggleLinks" aria-expanded="false">☰</button>

                </div>


        </div>
        <div class="nav-toggle-links" id="navToggleLinks" aria-hidden="true">
                <ul class="toggle-li">
                        <li><a href="">Home</a></li>
                        <li><a href="#about-us">About</a></li>
                        <li><a href="">Contact</a></li>
                        <li><a href="HTML/loogin.html"><button class="bl-btn">Login</button></a></li>
                        <li><a href="HTML/register.html"><button class="bl-btn">Register</button></a></li>
                </ul>
        </div>

        <!-- Form -->
        <div class="container mt-5 pt-5">
                <div class="row justify-content-center g-3">
                        <div class="col-md-5 d-none d-md-block inner-img"></div>
                        <div class="col-12 col-md-6 login-box">
                                <h3 class="text-center mb-4">Search Blood</h3>
                                <form id="loginForm" novalidate>
                                        <div class="form-floating mb-3 position-relative">
                                                <input type="text" class="form-control" id="patientName" placeholder="Patient Name" required>
                                                <label for="patientName">Patient Name</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <input type="number" class="form-control" id="patientAge" placeholder="Patient Age" min="0" required>
                                                <label for="patientAge">Patient Age</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <input type="text" class="form-control" id="aadharNumber" placeholder="Aadhar Number" maxlength="12" required>
                                                <label for="aadharNumber">Aadhar Number</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <select class="form-control" id="bloodGroup" required>
                                                        <option value="" disabled selected>Select</option>
                                                        <option value="A+">A+</option>
                                                        <option value="A-">A-</option>
                                                        <option value="B+">B+</option>
                                                        <option value="B-">B-</option>
                                                        <option value="AB+">AB+</option>
                                                        <option value="AB-">AB-</option>
                                                        <option value="O+">O+</option>
                                                        <option value="O-">O-</option>
                                                </select>
                                                <label for="bloodGroup">Blood Group</label>
                                        </div>

                                        <div class="form-floating mb-3 position-relative">
                                                <input type="number" class="form-control" id="unitNeeded" placeholder="Unit Needed" min="1" required>
                                                <label for="unitNeeded">Unit Needed</label>
                                        </div>

                                        <button type="submit" class="btn btn-primary w-100">Search</button>

                                        <div class="footer-text mt-3">Want to Donate? <a href="donate.html">Donate Blood</a></div>
                                </form>
                        </div>
                </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
