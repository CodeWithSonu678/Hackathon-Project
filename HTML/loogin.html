<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="../CSS/loogin.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
        <div class="container">
                <div class="row justify-content-center">
                        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                                <div class="login-box">
                                        <h3 class="text-center mb-4">Login</h3>
                                        <form id="loginForm" novalidate>
                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="tel" class="form-control" id="username"
                                                                placeholder="Mobile Number" required>
                                                        <label for="username">Mobile Number</label>
                                                </div>
                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="password" class="form-control" id="password"
                                                                placeholder="Password" required>
                                                        <label for="password">Password</label>
                                                        <span class="toggle-password"
                                                                onclick="togglePassword()">Show</span>
                                                </div>

                                                <button type="submit" class="btn btn-primary w-100">Login</button>

                                                <div class="footer-text">Don't have any account?<a href="register.html">Register</a></div>
                                        </form>
                                </div>
                        </div>
                </div>
        </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="../JS/loogin.js"></script>

</html>
