        <link rel="stylesheet" href="../CSS/donate.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

         <!-- Nav -->
        <div class="outer_body">
                <div class="logo_nav">
                        <img src="../CSS/img/new-logo.jpeg" alt="">
                </div>
                <div class="nav_icon">
                        <nav class="navbar navbar-expand-lg ">
                                <div class="container-fluid">
                                        <button class="navbar-toggler mt-2" type="button" data-bs-toggle="collapse"
                                                data-bs-target="#navbarNav" aria-controls="navbarNav"
                                                aria-expanded="false" aria-label="Toggle navigation">
                                                <span class="navbar-toggler-icon"></span>
                                        </button>
                                        <div class="collapse navbar-collapse" id="navbarNav">
                                                <ul class="navbar-nav">
                                                        <li class="nav-item m-1 p-2">
                                                                <a class=" active n-l" aria-current="page"
                                                                        href="../index.html">Home</a>
                                                        </li>
                                                        <li class="nav-item m-1 p-2">
                                                                <a class="active n-l" href="#">About</a>
                                                        </li>
                                                        <li class="nav-item m-1 p-2">
                                                                <a class="active n-l" href="#">Contact</a>
                                                        </li>
                                                        <li class="nav-item m-1 p-2">
                                                                <button><a class="active btn-nav bl-btn" style="margin: 0px;" href="HTML/loogin.html">
                                                                        Login
                                                                </a></button>
                                                        </li>
                                                        <div class="nav-item m-1 p-2">
                                                               <button><a class="active btn-nav bl-btn"
                                                                style="margin: 0px;"
                                                                        href="HTML/register.html">
                                                                        Register
                                                                </a></button>
                                                        </div>
                                                </ul>
                                        </div>
                                </div>
                        </nav>
                </div>
        </div>

        <!-- Form -->
        <div class="row justify-content-center mt-5">
                <div class="col-7 inner-img"></div>
                <div class="col-5 login-box">
                        <h3 class="text-center mb-4">Search Blood</h3>
                        <form id="loginForm" novalidate>
                                <div class="form-floating mb-3 position-relative">
                                        <input type="text" class="form-control" id="username" placeholder="Donar Name"
                                                required>
                                        <label for="username">Patient Name</label>
                                </div>
                        
                                <div class="form-floating mb-3 position-relative">
                                        <input type="tel" class="form-control" id="username" placeholder="Donar Age"
                                                required>
                                        <label for="username">Patient Age</label>
                                </div>

                                <div class="form-floating mb-3 position-relative">
                                        <input type="tel" class="form-control" id="username" placeholder="Aadhar Number"
                                                required>
                                        <label for="username">Aadhar Number</label>
                                </div>

                                <div class="form-floating mb-3 position-relative">
                                        <select name="" id="" class="form-control">
                                                <option value="Select">Select</option>
                                                <option value="A+">A+</option>
                                                <option value="A+">A-</option>
                                                <option value="A+">B+</option>
                                                <option value="A+">B-</option>
                                                <option value="A+">AB+</option>
                                                <option value="A+">AB-</option>
                                                <option value="A+">O+</option>
                                                <option value="A+">O-</option>
                                        </select>
                                        <label for="username">Blood Group</label>
                                </div>

                                <div class="form-floating mb-3 position-relative">
                                        <input type="tel" class="form-control" id="username" placeholder="Unit Needed"
                                                required>
                                        <label for="username">Unit Needed</label>
                                </div>

                                <button type="submit" class="btn btn-primary w-100">Search</button>

                                <div class="footer-text">Want to Donate?<a href="donate.html">Donate Blood</a></div>
                        </form>
                </div>

        </div>


</body>

</html>
