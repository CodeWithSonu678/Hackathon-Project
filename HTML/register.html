<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login Page</title>


        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

        <style>
                body {
                        min-height: 100vh;
                        background-color: black;
                        -webkit-backdrop-filter: blur(5px);
                        backdrop-filter: blur(5px);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                }

                .login-box {
                        background: white;
                        padding: 2rem;
                        border-radius: 1rem;
                        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                        animation: fadeIn 1s ease;
                }

                @keyframes fadeIn {
                        from {
                                opacity: 0;
                                transform: translateY(40px);
                        }

                        to {
                                opacity: 1;
                                transform: translateY(0);
                        }
                }

                .form-floating>label {
                        color: #777;
                }

                .form-control:focus {
                        border-color: #764ba2;
                        box-shadow: 0 0 0 0.2rem rgba(118, 75, 162, 0.25);
                }

                .toggle-password {
                        position: absolute;
                        top: 50%;
                        right: 1rem;
                        transform: translateY(-50%);
                        cursor: pointer;
                        font-size: 0.875rem;
                        color: #666;
                }


                button[type="submit"] {
                        background: #764ba2;
                        border: none;
                }

                button[type="submit"]:hover {
                        background: #5a3792;
                }

                .footer-text {
                        margin-top: 1rem;
                        text-align: center;
                        color: #666;
                        font-size: 0.9rem;
                }
        </style>
</head>

<body>

        <div class="container">
                <div class="row justify-content-center">
                        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                                <div class="login-box">
                                        <h3 class="text-center mb-4">Register</h3>
                                        <form id="loginForm" novalidate>
                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="text" class="form-control" id="username"
                                                                placeholder="Full Name" required>
                                                        <label for="username">Full Name</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="date" class="form-control" id="username"
                                                                placeholder="Date of birth" required>
                                                        <label for="username">Date of birth</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="tel" class="form-control" id="username"
                                                                placeholder="Mobile Number" required>
                                                        <label for="username">Mobile Number</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="email" class="form-control" id="username"
                                                                placeholder="Email" required>
                                                        <label for="username">Email</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="" class="form-control" id="username"
                                                                placeholder="Email" required>
                                                        <label for="username">Email</label>
                                                </div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="password" class="form-control" id="password"
                                                                placeholder="Password" required>
                                                        <label for="password">Password</label>
                                                        <span class="toggle-password"
                                                                onclick="togglePassword()">Show</span>
                                                </div>

                                                <div id="password-strength" class="form-text text-muted mb-3">Enter a
                                                        password to see strength.</div>
                                                <div id="error-message" class="text-danger mb-3" role="alert"
                                                        aria-live="polite"></div>

                                                <div class="form-floating mb-3 position-relative">
                                                        <input type="password" class="form-control" id="password"
                                                                placeholder="Confirm Password" required>
                                                        <label for="password">Confirm Password</label>
                                                        <span class="toggle-password"
                                                                onclick="togglePassword()">Show</span>
                                                </div>

                                                <button type="submit" class="btn btn-primary w-100">Login</button>

                                                <div class="footer-text">Have an account?<a href="">Login</a></div>
                                        </form>
                                </div>
                        </div>
                </div>
        </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <script>
                const form = document.getElementById('loginForm');
                const usernameInput = document.getElementById('username');
                const passwordInput = document.getElementById('password');
                const passwordStrengthText = document.getElementById('password-strength');
                const errorMessage = document.getElementById('error-message');

                function togglePassword() {
                        const password = passwordInput;
                        const toggle = document.querySelector('.toggle-password');
                        if (password.type === 'password') {
                                password.type = 'text';
                                toggle.textContent = 'Hide';
                        } else {
                                password.type = 'password';
                                toggle.textContent = 'Show';
                        }
                }

                function checkPasswordStrength(password) {
                        if (!password) return '';

                        const hasUpper = /[A-Z]/.test(password);
                        const hasLower = /[a-z]/.test(password);
                        const hasNumber = /[0-9]/.test(password);
                        const hasSymbol = /[!@#$%^&*()_+\-[\]{};':"\\|,.<>\/?]/.test(password);
                        const length = password.length;

                        if (length >= 8 && hasUpper && hasLower && hasNumber && hasSymbol) {
                                return 'Strong';
                        }
                        if (length >= 6 && hasUpper && hasNumber) {
                                return 'Medium';
                        }
                        return 'Weak';
                }

                passwordInput.addEventListener('input', () => {
                        const strength = checkPasswordStrength(passwordInput.value);
                        passwordStrengthText.textContent = strength ? `Password Strength: ${strength}` : 'Enter a password to see strength.';
                        passwordStrengthText.className = 'form-text mb-3 ' +
                                (strength === 'Strong' ? 'text-success' : strength === 'Medium' ? 'text-warning' : 'text-danger');
                });

                form.addEventListener('submit', (event) => {
                        event.preventDefault();
                        errorMessage.textContent = '';

                        const mobile = usernameInput.value.trim();
                        const password = passwordInput.value;

                        const mobileValid = /^\d{10}$/.test(mobile);
                        if (!mobileValid) {
                                errorMessage.textContent = 'Please enter a valid 10-digit mobile number.';
                                usernameInput.focus();
                                return;
                        }

                        if (password.length < 6) {
                                errorMessage.textContent = 'Password must be at least 6 characters long.';
                                passwordInput.focus();
                                return;
                        }

                        if (checkPasswordStrength(password) === 'Weak') {
                                errorMessage.textContent = 'Please choose a stronger password (add uppercase, numbers, symbols).';
                                passwordInput.focus();
                                return;
                        }

                        errorMessage.className = 'text-success mb-3';
                        errorMessage.textContent = 'Login successful!';
                        setTimeout(() => {
                                form.reset();
                                passwordStrengthText.textContent = 'Enter a password to see strength.';
                                passwordStrengthText.className = 'form-text text-muted mb-3';
                                errorMessage.textContent = '';
                                errorMessage.className = 'text-danger mb-3';
                        }, 1500);
                });
        </script>

</body>

</html>


</html>
