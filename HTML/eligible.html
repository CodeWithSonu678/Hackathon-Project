<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Donate Blood</title>
        <link rel="stylesheet" href="../CSS/eligible.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

        <!-- Nav -->
        <div class="outer_body">
                <div class="logo_nav">
                        <img src="../CSS/img/new-logo.jpeg" alt="">
                </div>
                <div class="nav_icon">
                        <nav class="navbar navbar-expand-lg ">
                                <div class="container-fluid">
                                        <button class="navbar-toggler mt-2" type="button" data-bs-toggle="collapse"
                                                data-bs-target="#navbarNav" aria-controls="navbarNav"
                                                aria-expanded="false" aria-label="Toggle navigation">
                                                <span class="navbar-toggler-icon"></span>
                                        </button>
                                        <div class="collapse navbar-collapse" id="navbarNav">
                                                <ul class="navbar-nav">
                                                        <li class="nav-item m-1 p-2">
                                                                <a class=" active n-l" aria-current="page"
                                                                        href="../index.html">Home</a>
                                                        </li>
                                                        <li class="nav-item m-1 p-2">
                                                                <a class="active n-l" href="#">About</a>
                                                        </li>
                                                        <li class="nav-item m-1 p-2">
                                                                <a class="active n-l" href="#">Contact</a>
                                                        </li>
                                                        <li class="nav-item m-1 p-2">
                                                                <button><a class="active btn-nav bl-btn"
                                                                                style="margin: 0px;"
                                                                                href="HTML/loogin.html">
                                                                                Login
                                                                        </a></button>
                                                        </li>
                                                        <div class="nav-item m-1 p-2">
                                                                <button><a class="active btn-nav bl-btn"
                                                                                style="margin: 0px;"
                                                                                href="HTML/register.html">
                                                                                Register
                                                                        </a></button>
                                                        </div>
                                                </ul>
                                        </div>
                                </div>
                        </nav>
                </div>
        </div>

        <!-- Form -->
        <div class="form-body">
                <div class="inner-img">
                        <img src="../CSS/img/reg-img.png" alt="" style="height: 550px;">
                </div>
                <div class="login-box">
                        <h3 class="text-center mb-4">Check Eligibility</h3>
                                <table style="margin: 15px;">
                                        <tr>
                                                <th id="out"><label for="gen">Are you between 18 and 65 years
                                                                old:</label></th>
                                                <td>
                                                        <input type="radio" name="year" id="gen">
                                                        <label for="gen">Yes</label>
                                                        <input type="radio" name="year" id="gen">
                                                        <label for="gen">No</label>
                                                </td>
                                        </tr>
                                        <tr>
                                                <th id="out"><label for="gen">Do you weigh over 50 kg?:</label></th>
                                                <td>
                                                        <input type="radio" name="weight" id="gen">
                                                        <label for="gen">Yes</label>
                                                        <input type="radio" name="weight" id="gen">
                                                        <label for="gen">No</label>
                                                </td>
                                        </tr>
                                        <tr>
                                                <th id="out"><label for="gen">Have you been ill in last two week?:</label></th>
                                                <td>
                                                        <input type="radio" name="ill" id="gen">
                                                        <label for="gen">Yes</label>
                                                        <input type="radio" name="ill" id="gen">
                                                        <label for="gen">No</label>
                                                </td>
                                        </tr>
                                        <tr>
                                                <th id="out"><label for="gen">Are you currently taking any medications?:</label></th>
                                                <td>
                                                        <input type="radio" name="med" id="gen">
                                                        <label for="gen">Yes</label>
                                                        <input type="radio" name="med" id="gen">
                                                        <label for="gen">No</label>
                                                </td>
                                        </tr>
                                        <tr>
                                                <th id="out"><label for="gen">Date of your last blood donation:</label></th>
                                                <td>
                                                        <input type="date" name="" id="">
                                                </td>
                                        </tr> 
                                </table>
                                <button type="submit" class="btn btn-primary mt-2">Search</button>
                </div>

        </div>


</body>

</html>
